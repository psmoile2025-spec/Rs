{% extends "base.html" %}
{% block title %}Account{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Account Settings</h1>
  <span class="page-header-sub">{{ user.email }}</span>
</div>

<div class="card">
    <div class="card-header"><h2>Profile</h2></div>
    <form method="POST" action="{{ url_for('auth.account') }}" class="form">
        <input type="hidden" name="action" value="profile">
        <div class="form-group">
            <label for="display_name">Display Name</label>
            <input type="text" id="display_name" name="display_name" value="{{ user.display_name }}" required class="form-control">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ user.email }}" required class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>

<div class="card">
    <div class="card-header"><h2>Change Password</h2></div>
    <form method="POST" action="{{ url_for('auth.account') }}" class="form">
        <input type="hidden" name="action" value="password">
        <div class="form-group">
            <label for="current_password">Current Password</label>
            <input type="password" id="current_password" name="current_password" required class="form-control">
        </div>
        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" required minlength="6" class="form-control">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="6" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Change Password</button>
    </form>
</div>
{% endblock %}
